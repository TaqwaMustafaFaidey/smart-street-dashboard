<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة رصد أعطال البنية التحتية</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .form-container {
            max-width: 700px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .form-label {
            font-weight: 600;
            color: #334155;
            margin-top: 15px;
        }
        .btn-submit {
            background-color: #2b5998;
            color: white;
            font-weight: bold;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            border: none;
            transition: background 0.3s ease;
        }
        .btn-submit:hover {
            background-color: #1e3d6b;
            color: white;
        }
        /* تأثيرات الراديو لدرجة الخطورة */
        .severity-group .btn-check:checked + .btn {
            border-width: 2px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        
        <div class="text-center mb-4">
            <h3 class="fw-bold"><i class="fa-solid fa-file-pen"></i> نموذج تسجيل بلاغ جديد</h3>
            <p class="text-muted small">يرجى تحديد البيانات المطلوبة وسيتم توجيه فريق الدعم الفني فوراً</p>
        </div>

        <form id="issueForm">
            
            <label for="issueType" class="form-label">نوع المشكلة المكتشفة</label>
            <select id="issueType" class="form-select" required>
                <option value="" disabled selected>اختر نوع المشكلة المكتشفة</option>
                <option value="تجمع تراكمي للمخلفات">تجمع تراكمي للمخلفات</option>
                <option value="عمود إنارة سقط على الأرض">عمود إنارة سقط على الأرض</option>
                <option value="كسر في ماسورة مياه">كسر في ماسورة مياه</option>
                <option value="هبوط أرضي أو حفرة خطيرة">هبوط أرضي أو حفرة خطيرة</option>
            </select>

            <label for="description" class="form-label">وصف تفصيلي وعيني للمشكلة</label>
            <textarea id="description" class="form-select" rows="4" placeholder="مثال: عمود إنارة واقع على الأرض وفيه أسلاك طالعة منه..." required></textarea>

            <label for="region" class="form-label">النطاق أو المنطقة الجغرافية</label>
            <select id="region" class="form-select" required>
                <option value="" disabled selected>اختر النطاق أو المنطقة الجغرافية</option>
                <option value="التجمع الخامس">التجمع الخامس</option>
                <option value="الجونة">الجونة</option>
                <option value="مدينة نصر">مدينة نصر</option>
                <option value="الساحل الشمالي">الساحل الشمالي</option>
            </select>

            <label for="locationCoords" class="form-label">العنوان النصي / اللوكيشن الدقيق</label>
            <div class="input-group">
                <button class="btn btn-outline-secondary" type="button" id="btnGetGPS">
                    <i class="fa-solid fa-location-crosshairs"></i> تحديد GPS
                </button>
                <input type="text" id="locationCoords" class="form-control" placeholder="إحداثيات حية للموقع..." readonly required>
            </div>
            <div id="gpsStatus" class="form-text mt-1 text-success fw-semibold">
                <i class="fa-solid fa-circle-info"></i> يمكنك استخدام مستشعر الـ GPS لجلب الإحداثيات آلياً
            </div>

            <label class="form-label d-block mt-3">درجة خطورة وأولوية البلاغ</label>
            <div class="row g-2 severity-group">
                <div class="col-4">
                    <input type="radio" class="btn-check" name="severity" id="low" value="اعتيادية" checked>
                    <label class="btn btn-outline-secondary w-100" for="low"><i class="fa-solid fa-circle-check"></i> اعتيادية</label>
                </div>
                <div class="col-4">
                    <input type="radio" class="btn-check" name="severity" id="medium" value="متوسطة الأهمية">
                    <label class="btn btn-outline-warning w-100" for="medium"><i class="fa-solid fa-triangle-exclamation"></i> متوسطة</label>
                </div>
                <div class="col-4">
                    <input type="radio" class="btn-check" name="severity" id="high" value="حرجة وعاجلة جداً">
                    <label class="btn btn-outline-danger w-100" for="high"><i class="fa-solid fa-radiation"></i> حرجة جداً</label>
                </div>
            </div>

            <div class="mt-4">
                <button type="submit" id="submitBtn" class="btn-submit">
                    <i class="fa-solid fa-paper-plane"></i> إرسال البلاغ وتثبيت الطابع الزمني!
                </button>
            </div>
            
            <div id="submissionStatus" class="mt-3 text-center d-none"></div>

        </form>
    </div>
</div>

<script type="module">
    // استدعاء حزم Firebase SDK اللازمة
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ⚠️ ضع بيانات الـ Firebase Config الخاصة بمشروعك (smart-street-dashboard) هنا:
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "smart-street-dashboard-315dc.firebaseapp.com",
        projectId: "smart-street-dashboard-315dc",
        storageBucket: "smart-street-dashboard-315dc.appspot.com",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // تهيئة الفايربيس وقاعدة البيانات
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // تعريف عناصر واجهة المستخدم
    const form = document.getElementById("issueForm");
    const btnGetGPS = document.getElementById("btnGetGPS");
    const gpsStatus = document.getElementById("gpsStatus");
    const locationCoords = document.getElementById("locationCoords");
    const submitBtn = document.getElementById("submitBtn");
    const submissionStatus = document.getElementById("submissionStatus");

    // 1️⃣ تفريغ الكاش الإجباري عند تحميل الصفحة للتغلب على عناد المتصفح
    window.addEventListener("DOMContentLoaded", () => {
        setTimeout(() => {
            if (form) {
                form.reset();
                document.getElementById("issueType").selectedIndex = 0;
                document.getElementById("region").selectedIndex = 0;
                locationCoords.value = "";
            }
        }, 100); 
    });

    // 2️⃣ منطق عمل زر الـ GPS وتلوينه بالأخضر عند النجاح
    if (btnGetGPS) {
        btnGetGPS.addEventListener("click", () => {
            if (navigator.geolocation) {
                gpsStatus.innerHTML = `<i class="fa-solid fa-spinner fa-spin text-primary"></i> جاري تحديد الإحداثيات...`;
                
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    // تعبئة حقل الإحداثيات
                    locationCoords.value = `(${lat.toFixed(6)}, ${lng.toFixed(6)})`;
                    
                    // إظهار نص النجاح الأخضر تحت الحقل
                    gpsStatus.innerHTML = `<span style="color: #2dc937;"><i class="fa-solid fa-circle-check"></i> تم التقاط موقعك الحالي بنجاح</span>`;
                    
                    // تلوين زرار الـ GPS نفسه باللون الأخضر غصب عن المتصفح
                    btnGetGPS.style.setProperty("background-color", "#2dc937", "important");
                    btnGetGPS.style.setProperty("color", "white", "important");
                    btnGetGPS.style.setProperty("border-color", "#2dc937", "important");
                    btnGetGPS.innerHTML = "✓ تم التحديد";
                    
                }, (error) => {
                    gpsStatus.innerHTML = `<span style="color: #dc3545;"><i class="fa-solid fa-circle-xmark"></i> عذراً، فشل تحديد الموقع. تأكد من تفعيل الـ GPS</span>`;
                    console.error("GPS Error:", error);
                });
            } else {
                gpsStatus.innerHTML = "متصفحك لا يدعم تحديد الموقع الجغرافي.";
            }
        });
    }

    // 3️⃣ منطق إرسال البيانات إلى Cloud Firestore وتصفير العناصر
    if (form) {
        form.addEventListener("submit", async (e) => {
            e.preventDefault(); // منع الصفحة من الريفرش الافتراضي
            
            // تغيير شكل زر الإرسال إلى حالة التحميل
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> جاري رفع البيانات وتثبيت الطابع...`;

            // جلب القيمة المختارة لدرجة الخطورة من الراديو بوتون
            const severityRadio = document.querySelector('input[name="severity"]:checked');
            const severityValue = severityRadio ? severityRadio.value : "اعتيادية";

            try {
                // إضافة مستند جديد في كوليكشن البلاغ بالفايرستور
                await addDoc(collection(db, "infrastructure_issues"), {
                    issueType: document.getElementById("issueType").value,
                    description: document.getElementById("description").value,
                    region: document.getElementById("region").value,
                    coordinates: locationCoords.value,
                    severity: severityValue,
                    timestamp: serverTimestamp() // الطابع الزمني السيرفر آلياً
                });

                // إظهار شريط النجاح الأزرق للمستخدم
                submissionStatus.className = "alert alert-primary mt-3";
                submissionStatus.innerHTML = `<i class="fa-solid fa-circle-check"></i> تم تسجيل البلاغ بنجاح وتثبيت الطابع الزمني!`;
                submissionStatus.classList.remove("d-none");

                // تصفير وإعادة تهيئة جميع حقول الفورم بالكامل
                form.reset();
                document.getElementById("issueType").selectedIndex = 0; // إرجاع نوع المشكلة للافتراضي
                document.getElementById("region").selectedIndex = 0;    // إرجاع المنطقة للافتراضي
                
                // إرجاع زر الـ GPS لحالته ولونه الأصلي بعد نجاح العملية
                btnGetGPS.style.removeProperty("background-color");
                btnGetGPS.style.removeProperty("color");
                btnGetGPS.style.removeProperty("border-color");
                btnGetGPS.innerHTML = `<i class="fa-solid fa-location-crosshairs"></i> تحديد GPS`;
                gpsStatus.innerHTML = `<i class="fa-solid fa-circle-info"></i> يمكنك استخدام مستشعر الـ GPS لجلب الإحداثيات آلياً`;

            } catch (error) {
                // التعامل مع الأخطاء لو فشل الاتصال بقاعدة البيانات
                submissionStatus.className = "alert alert-danger mt-3";
                submissionStatus.innerHTML = `<i class="fa-solid fa-circle-xmark"></i> حدث خطأ أثناء إرسال البيانات، يرجى المحاولة لاحقاً.`;
                submissionStatus.classList.remove("d-none");
                console.error("Firebase Error: ", error);
            } finally {
                // إعادة زر الإرسال لوضعه الطبيعي
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> إرسال البلاغ وتثبيت الطابع الزمني!`;
            }
        });
    }
</script>

</body>
</html>
