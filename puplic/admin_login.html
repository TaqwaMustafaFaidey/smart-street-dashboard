<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول الإدارة المركزية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #ffffff;
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .brand-logo {
            font-size: 26px;
            font-weight: 800;
            color: #1e293b;
            text-align: center;
            margin-bottom: 5px;
        }
        .brand-logo span {
            color: #dc3545;
        }
        .btn-login {
            background-color: #1e293b;
            color: white;
            font-weight: 600;
            padding: 12px;
            border-radius: 8px;
            transition: all 0.3s;
            border: none;
        }
        .btn-login:hover {
            background-color: #0f172a;
            color: white;
        }
        .alert-error {
            display: none;
            font-size: 14px;
            border-radius: 8px;
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-logo"><i class="fa-solid fa-shield-halved text-danger me-2"></i>Smart<span>Dashboard</span></div>
    <p class="text-muted text-center small mb-4">بوابة تسجيل دخول المراقبين والأدمن فقط</p>
    
    <div class="alert alert-danger alert-error text-center mb-3" id="error-message">
        <i class="fa-solid fa-circle-exclamation"></i> خطأ في البريد الإلكتروني أو كلمة المرور!
    </div>

    <form id="adminLoginForm">
        <div class="mb-3">
            <label class="form-label fw-semibold small text-secondary">بريد الأدمن الإلكتروني</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fa-solid fa-user-gear"></i></span>
                <input type="email" id="adminEmail" class="form-control border-start-0 bg-light" placeholder="admin@street.com" required>
            </div>
        </div>
        
        <div class="mb-4">
            <label class="form-label fw-semibold small text-secondary">كلمة المرور</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fa-solid fa-key"></i></span>
                <input type="password" id="adminPassword" class="form-control border-start-0 bg-light" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="btn btn-login w-100">دخول للنظام المركزي <i class="fa-solid fa-arrow-left-to-bracket ms-1"></i></button>
    </form>
</div>

<script>
    document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const email = document.getElementById('adminEmail').value.trim();
        const password = document.getElementById('adminPassword').value;
        const errorAlert = document.getElementById('error-message');
        
        errorAlert.style.display = 'none';

        // الحساب الخاص بيكِ كـ أدمن للوحة التحكم
        if (email === 'admin@street.com' && password === 'admin123') {
            sessionStorage.setItem('adminLoggedIn', 'true');
            window.location.href = 'issues.html'; 
        } else {
            errorAlert.style.display = 'block'; 
        }
    });
</script>

</body>
</html>
