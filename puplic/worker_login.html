<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة العمال - تسجيل الدخول</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: #ffffff;
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .brand-logo {
            font-size: 24px;
            font-weight: 800;
            color: #1e293b;
            text-align: center;
            margin-bottom: 5px;
        }
        .brand-logo span {
            color: #0284c7;
        }
        .btn-worker {
            background-color: #0284c7;
            color: white;
            font-weight: 600;
            padding: 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
            border: none;
        }
        .btn-worker:hover {
            background-color: #0369a1;
            color: white;
        }
        .input-group-text {
            border-left: none !important;
            border-radius: 0 8px 8px 0 !important;
        }
        .form-control {
            border-right: none !important;
            border-radius: 8px 0 0 8px !important;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #0284c7;
            background-color: #fff !important;
        }
        .alert-msg {
            display: none;
            font-size: 14px;
            border-radius: 8px;
            padding: 12px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-logo">
        <i class="fa-solid fa-helmet-safety text-info me-2"></i>بوابة<span> العمال</span>
    </div>
    <p class="text-muted text-center small mb-4">نظام تسجيل دخول الفنيين ومقدمي الخدمة الميدانية</p>
    
    <div class="alert alert-danger alert-msg text-center mb-3" id="msg" role="alert"></div>

    <form id="workerLoginForm">
        <div class="mb-3">
            <label for="loginPhone" class="form-label fw-semibold small text-secondary">رقم الهاتف</label>
            <div class="input-group">
                <span class="input-group-text bg-light text-muted"><i class="fa-solid fa-phone"></i></span>
                <input type="tel" id="loginPhone" class="form-control bg-light" placeholder="01xxxxxxxxx" required>
            </div>
        </div>
        
        <div class="mb-4">
            <label for="password" class="form-label fw-semibold small text-secondary">كلمة المرور</label>
            <div class="input-group">
                <span class="input-group-text bg-light text-muted"><i class="fa-solid fa-lock"></i></span>
                <input type="password" id="password" class="form-control bg-light" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-worker w-100">
            <span>دخول للنظام</span> 
            <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i>
        </button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // إعدادات الـ Firebase Config الخاصة بمشروعك
    const firebaseConfig = {
        apiKey: "AIzaSyDTQs_H3KOVUkTD-RNnGIIE2nGvOjwf75s",
        authDomain: "smart-street-dashboard-315dc.firebaseapp.com",
        projectId: "smart-street-dashboard-315dc",
        storageBucket: "smart-street-dashboard-315dc.firebasestorage.app",
        messagingSenderId: "584982507857",
        appId: "1:584982507857:web:cb0389114b14c23e21e370",
        measurementId: "G-7TVNFGK93Q"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // معالجة حدث إرسال الفورم (اللوجيك المنطقي)
    document.getElementById('workerLoginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const phone = document.getElementById('loginPhone').value.trim();
        const passwordInput = document.getElementById('password').value;
        const msgAlert = document.getElementById('msg');
        const submitBtn = document.getElementById('submitBtn');
        
        // تحضير واجهة المستخدم لحالة التحميل
        msgAlert.style.display = 'none';
        msgAlert.className = "alert alert-danger alert-msg text-center mb-3"; // إعادة كلاس الـ danger الافتراضي
        submitBtn.disabled = true;
        submitBtn.innerHTML = `<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> جاري التحقق...`;

        try {
            // 🔎 الخطوة 1: استعلام في كوليكشن "workers" للبحث عن الهاتف المتطابق
            const workersRef = collection(db, "workers");
            const q = query(workersRef, where("phone", "==", phone));
            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                // الهاتف غير موجود بالأساس
                throw new Error("رقم الهاتف غير مسجل بالنظام!");
            }

            // 🔑 الخطوة 2: جلب بيانات العامل ومطابقة كلمة المرور
            let userDoc = null;
            querySnapshot.forEach((doc) => {
                userDoc = doc.data();
            });

            if (userDoc.password !== passwordInput) {
                // كلمة المرور خاطئة
                throw new Error("كلمة المرور غير صحيحة، حاول مجدداً.");
            }

            // 🎉 الخطوة 3: نجاح عملية الدخول بنجاح
            msgAlert.className = "alert alert-success alert-msg text-center mb-3";
            msgAlert.style.display = 'block';
            msgAlert.innerHTML = `<i class="fa-solid fa-circle-check me-1"></i> تم تسجيل الدخول بنجاح! جاري التوجيه...`;
            
            // حفظ بيانات العامل في الـ sessionStorage للاستخدام في الصفحات الداخلية
            sessionStorage.setItem('workerLoggedIn', 'true');
            sessionStorage.setItem('workerPhone', userDoc.phone);
            sessionStorage.setItem('workerName', userDoc.name || 'عامل ميداني');

            // التوجه لصفحة مهام العمال بعد ثانية واحدة (يمكنك تغيير اسم الصفحة لصفحتك الحالية)
            setTimeout(() => {
                window.location.href = 'worker_tasks.html'; 
            }, 1200);

        } catch (error) {
            // عرض رسائل الخطأ الذكية للمستخدم
            msgAlert.style.display = 'block';
            msgAlert.innerHTML = `<i class="fa-solid fa-circle-exclamation me-1"></i> ${error.message}`;
            
            // إعادة تفعيل زر الدخول
            submitBtn.disabled = false;
            submitBtn.innerHTML = `<span>دخول للنظام</span> <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i>`;
        }
    });
</script>

</body>
</html>
